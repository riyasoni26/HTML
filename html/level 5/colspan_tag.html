<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tag</title>
</head>
<body>
    <table border="2">
            <caption>Technology</caption>
            <tr>
                <th colspan="2">Tech I am good</th>
            </tr>
    <tr>
        <th>Language</th>
        <th>Competency</th>
        <th>Years</th>
    </tr>
    <tr>
        <td>C</td>
        <td>5/10</td>
        <td>6 years</td>
    </tr>

     <tr>
        <td>C++</td>
        <td>2/10</td>
        <td>2 years</td>
    </tr>
</body>
</html>
